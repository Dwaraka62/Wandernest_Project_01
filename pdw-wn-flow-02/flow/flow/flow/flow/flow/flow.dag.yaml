$schema: https://azuremlschemas.azureedge.net/promptflow/latest/Flow.schema.json
environment:
  python_requirements_txt: requirements.txt
inputs:
  chat_history:
    type: list
    is_chat_history: true
    default: []
  question:
    type: string
    is_chat_input: true
outputs:
  answer:
    type: string
    reference: ${chat.output}
    is_chat_output: true
nodes:
- name: chat
  type: llm
  source:
    type: code
    path: chat.jinja2
  inputs:
    deployment_name: gpt-5-mini
    temperature: 1
    question: ${inputs.question}
    response_format:
      type: text
    contexts: ${retrieval.output}
  connection: azure_openai_connection
  api: chat
- name: retrieval
  type: python
  source:
    type: code
    path: retrieval.py
  inputs:
    query: ${inputs.question}
    search_connection: azure_aisearch_connection
    index_name: rag-pdw-13may26
